<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WolfVox | Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; overflow-x: hidden; }
        .glass-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.2s;
        }
        .glass-input:focus {
            border-color: #7a6cff;
            background: rgba(255, 255, 255, 0.05);
            outline: none;
        }
        .step-card {
            border-left: 2px solid rgba(255, 255, 255, 0.1);
            padding-left: 24px;
        }
        #main-content { display: none; }
        .drag-over { border-color: #7a6cff !important; background: rgba(122, 108, 255, 0.05); }
        
        /* Custom scrollbar for sidebar */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="antialiased">

    <nav class="flex items-center justify-between px-8 py-4 border-b border-white/10 bg-black/50 backdrop-blur-md sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold tracking-tighter cursor-pointer" onclick="location.href='/'">WOLF<span class="text-gray-500">VOX</span></h1>
            <span class="text-xs bg-white/10 px-2 py-1 rounded text-gray-400">Console</span>
        </div>
        <div id="user-profile" class="flex items-center gap-3"></div>
    </nav>

    <main id="main-content" class="flex min-h-screen">
        <!-- LEFT SIDEBAR: Project List -->
        <aside class="w-64 border-r border-white/10 p-6 hidden md:block custom-scroll overflow-y-auto">
            <h3 class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-6">Your Projects</h3>
            <div id="project-list" class="space-y-2">
                <!-- Projects injected here -->
                <p class="text-xs text-gray-600 animate-pulse">Scanning storage...</p>
            </div>
        </aside>

        <!-- RIGHT CONTENT: Deploy Form -->
        <section class="flex-1 px-8 py-16 max-w-4xl">
            <header class="mb-12">
                <h2 id="form-title" class="text-3xl font-semibold mb-2">Create New Project</h2>
                <p class="text-gray-500">Deploy your static site or select a project to update.</p>
            </header>

            <div class="space-y-12">
                <section class="step-card">
                    <h3 class="text-sm font-bold uppercase tracking-widest text-gray-500 mb-6">1. Project Identity</h3>
                    <div class="grid md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-xs font-medium text-gray-400 mb-2 uppercase">Display Name</label>
                            <input type="text" id="proj-name" placeholder="My Awesome Site" class="w-full glass-input rounded-md px-4 py-2">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-400 mb-2 uppercase">Project Slug (URL)</label>
                            <div class="flex items-center">
                                <span class="bg-white/5 border border-r-0 border-white/10 px-3 py-2 rounded-l-md text-gray-500 text-sm">wolfvox.io/</span>
                                <input type="text" id="proj-slug" placeholder="my-site" class="w-full glass-input rounded-r-md px-4 py-2">
                            </div>
                        </div>
                    </div>
                </section>

                <section class="step-card">
                    <h3 class="text-sm font-bold uppercase tracking-widest text-gray-500 mb-6">2. Content Source</h3>
                    <div id="drop-zone" class="border-2 border-dashed border-white/10 rounded-xl p-10 text-center hover:border-white/20 transition cursor-pointer">
                        <i class="fa-solid fa-cloud-arrow-up text-3xl text-gray-600 mb-4"></i>
                        <p id="file-label" class="text-sm text-gray-400">Drag & drop files or <span class="text-white underline">browse</span></p>
                        <input type="file" class="hidden" id="file-upload" accept=".html,.css,.js" multiple>
                    </div>
                </section>

                <div class="pt-6 border-t border-white/10 flex items-center justify-between">
                    <p class="text-xs text-gray-500 max-w-sm">
                        Files are synced to Supabase Storage. Use <b>index.html</b> as your main entry point.
                    </p>
                    <div class="flex gap-4">
                        <button onclick="resetForm()" class="text-sm text-gray-500 hover:text-white transition">Cancel</button>
                        <button onclick="handleDeploy()" id="deploy-btn" class="bg-white text-black px-8 py-3 rounded-md font-bold hover:bg-gray-200 transition">
                            Deploy Project
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // 1. Initialize Supabase
        const SB_URL = "https://lqdrtozuoslhufhpqwae.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxxZHJ0b3p1b3NsaHVmaHBxd2FlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5ODU1MDgsImV4cCI6MjA4ODU2MTUwOH0.0WScKpedr7AB2O93bVmXXar5R8KcUPmHXyUSndIxF2o";
        window.supabase = supabasejs.createClient(SB_URL, SB_KEY);

        // 2. Auth & User Handling
        const user = JSON.parse(localStorage.getItem('wv_user'));
        window.selectedFiles = [];

        if (!user) {
            window.location.href = 'https://wolfvox.github.io/signin';
        } else {
            document.getElementById('main-content').style.display = 'flex';
            renderUserNav();
            loadUserProjects();
        }

        function renderUserNav() {
            const nav = document.getElementById('user-profile');
            nav.innerHTML = `
                <div class="text-right hidden sm:block">
                    <p class="text-xs font-medium">${user.name}</p>
                    <p class="text-[10px] text-gray-500">${user.email}</p>
                </div>
                <img src="${user.img}" class="w-8 h-8 rounded-full border border-white/20">
                <button onclick="logout()" class="text-gray-500 hover:text-red-400 transition ml-2">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </button>
            `;
        }

        function logout() {
            localStorage.removeItem('wv_user');
            window.location.href = 'https://wolfvox.github.io/signin';
        }

        // 3. Sidebar Project Loading
        async function loadUserProjects() {
            const username = user.name.toLowerCase().replace(/[^a-z0-9]/g, '');
            const listContainer = document.getElementById('project-list');

            // List files/folders in bucket
            const { data, error } = await window.supabase.storage.from('sites').list(username);

            if (error || !data) {
                listContainer.innerHTML = '<p class="text-[10px] text-gray-700">No projects found.</p>';
                return;
            }

            // Map data to sidebar items
            listContainer.innerHTML = data.map(item => `
                <div onclick="prepUpdate('${item.name}')" class="group flex items-center justify-between p-2 hover:bg-white/5 rounded cursor-pointer transition border border-transparent hover:border-white/5">
                    <span class="text-sm text-gray-400 group-hover:text-white truncate">${item.name}</span>
                    <i class="fa-solid fa-chevron-right text-[10px] text-gray-800 group-hover:text-gray-400"></i>
                </div>
            `).join('');
        }

        function prepUpdate(slug) {
            document.getElementById('proj-name').value = slug;
            document.getElementById('proj-slug').value = slug;
            document.getElementById('proj-slug').disabled = true;
            document.getElementById('form-title').innerText = "Update Project";
            document.getElementById('deploy-btn').innerText = "Push Updates";
            document.getElementById('file-label').innerHTML = `Drop new files to update <span class="text-white font-bold">${slug}</span>`;
        }

        function resetForm() {
            document.getElementById('proj-name').value = "";
            document.getElementById('proj-slug').value = "";
            document.getElementById('proj-slug').disabled = false;
            document.getElementById('form-title').innerText = "Create New Project";
            document.getElementById('deploy-btn').innerText = "Deploy Project";
            window.selectedFiles = [];
            document.getElementById('file-label').innerHTML = `Drag and drop files or <span class="text-white underline">browse</span>`;
        }

        // 4. Drag & Drop Logic
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-upload');
        const fileLabel = document.getElementById('file-label');

        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(name => {
            dropZone.addEventListener(name, (e) => { e.preventDefault(); e.stopPropagation(); });
        });

        dropZone.addEventListener('dragover', () => dropZone.classList.add('drag-over'));
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
        dropZone.addEventListener('drop', (e) => {
            dropZone.classList.remove('drag-over');
            handleFiles(e.dataTransfer.files);
        });

        function handleFiles(files) {
            const allowed = ['html', 'css', 'js'];
            const valid = Array.from(files).filter(f => allowed.includes(f.name.split('.').pop().toLowerCase()));
            
            if (valid.length > 0) {
                window.selectedFiles = valid;
                fileLabel.innerHTML = `<span class="text-white font-bold">${valid.length} files</span> selected.`;
            }
        }

        // 5. Deploy Logic
        async function handleDeploy() {
            const slug = document.getElementById('proj-slug').value;
            const username = user.name.toLowerCase().replace(/[^a-z0-9]/g, '');

            if (!slug || window.selectedFiles.length === 0) {
                alert("Please provide a slug and select files.");
                return;
            }

            const btn = document.getElementById('deploy-btn');
            btn.innerText = "Deploying...";
            btn.disabled = true;

            for (const file of window.selectedFiles) {
                const uploadPath = `${username}/${slug}/${file.name}`;
                const { error } = await window.supabase.storage
                    .from('sites')
                    .upload(uploadPath, file, { upsert: true });

                if (error) {
                    alert("Error: " + error.message);
                    btn.innerText = "Deploy Project";
                    btn.disabled = false;
                    return;
                }
            }

            alert("Site Live!");
            btn.innerText = "Deploy Project";
            btn.disabled = false;
            loadUserProjects(); // Refresh sidebar
        }
    </script>
</body>
</html>
