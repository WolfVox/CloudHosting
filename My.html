<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WolfVox | Explorer Pro</title>
    <style>
        /* --- HIGH CONTRAST DARK THEME --- */
        :root {
            --bg: #000000;
            --surface: #111111;
            --border: #333333;
            --text: #FFFFFF;
            --text-muted: #888888;
            --accent: #CC99FF; /* Purple */
            --link: #88CCFF;   /* Blue */
            --danger: #FF6666; /* Red */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg); color: var(--text); 
            line-height: 1.6;
        }
        
        .mono { font-family: "JetBrains Mono", monospace; font-size: 13px; }
        .hidden { display: none !important; }

        /* --- HEADER --- */
        header { 
            padding: 15px 25px; background: var(--bg); 
            border-bottom: 2px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }
        .logo { font-weight: 800; font-size: 20px; letter-spacing: -1px; cursor: pointer; }
        .logo span { color: var(--text-muted); }
        .user-badge { font-size: 12px; padding: 4px 10px; border: 1px solid var(--border); border-radius: 20px; }

        /* --- LAYOUT --- */
        .container { display: flex; min-height: calc(100vh - 60px); }
        
        /* Sidebar */
        aside { 
            width: 260px; border-right: 2px solid var(--border); 
            padding: 20px; background: var(--bg);
        }
        .sidebar-label { font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 15px; display: block; }
        .nav-item { 
            display: block; padding: 10px; color: var(--text-muted); 
            text-decoration: none; border-radius: 6px; margin-bottom: 5px;
            transition: 0.2s;
        }
        .nav-item:hover { background: var(--surface); color: var(--text); }
        .nav-item.active { background: var(--accent); color: var(--bg); font-weight: 700; }

        /* Main View */
        main { flex: 1; padding: 40px; }
        .card { border: 2px solid var(--border); border-radius: 8px; overflow: hidden; background: var(--bg); }
        .card-header { 
            background: var(--surface); padding: 12px 20px; 
            border-bottom: 2px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }

        /* File List */
        .file-row { 
            display: flex; justify-content: space-between; padding: 12px 20px;
            border-bottom: 1px solid var(--border); cursor: pointer;
        }
        .file-row:hover { background: var(--surface); }
        .file-name { display: flex; align-items: center; gap: 10px; }
        .icon { width: 16px; text-align: center; font-weight: bold; }
        
        /* Code Viewer */
        .code-wrap { position: relative; }
        pre { padding: 25px; overflow-x: auto; margin: 0; background: #050505; }
        code { color: var(--text); tab-size: 4; }
        
        /* Buttons */
        .btn { padding: 6px 12px; border-radius: 4px; font-size: 12px; font-weight: 700; text-decoration: none; display: inline-block; }
        .btn-blue { border: 1px solid var(--link); color: var(--link); }
        .btn-blue:hover { background: var(--link); color: var(--bg); }
        .btn-red { color: var(--danger); }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="location.href='/'">WOLF<span>VOX</span></div>
        <div class="flex items-center gap-4">
            <span id="display-user" class="user-badge mono">Detecting User...</span>
            <button onclick="checkCookies()" class="btn btn-blue" style="margin-left:10px">Debug Cookies</button>
        </div>
    </header>

    <div class="container">
        <aside>
            <span class="sidebar-label">Your Projects</span>
            <div id="repo-list">
                <p class="mono" style="color:var(--text-muted)">Loading...</p>
            </div>
        </aside>

        <main>
            <div id="explorer-view">
                <div class="card">
                    <div class="card-header">
                        <span id="path-display" class="mono text-accent">/root</span>
                        <span id="file-count" class="mono" style="font-size:11px">0 items</span>
                    </div>
                    <div id="file-list">
                        <div class="p-20 text-center" style="padding:40px">
                            <p class="text-muted">Select a repository to view files.</p>
                        </div>
                    </div>
                </div>
            </div>

            <div id="code-view" class="hidden">
                <div class="card">
                    <div class="card-header">
                        <span id="current-file-name" class="mono text-accent">file.js</span>
                        <button onclick="closeCode()" class="btn btn-red">[ CLOSE ]</button>
                    </div>
                    <div class="code-wrap">
                        <pre><code id="code-output" class="mono"></code></pre>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // --- CONFIG ---
        const SB_URL = "https://lqdrtozuoslhufhpqwae.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxxZHJ0b3p1b3NsaHVmaHBxd2FlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5ODU1MDgsImV4cCI6MjA4ODU2MTUwOH0.0WScKpedr7AB2O93bVmXXar5R8KcUPmHXyUSndIxF2o";
        const RENDER_URL = "https://wolfcloud.onrender.com";

        let sb;
        let username = "guest";
        let activeRepo = new URLSearchParams(window.location.search).get('repo');

        // --- 1. ROBUST COOKIE PARSER ---
        function fetchUserFromCookie() {
            const name = "wv_user=";
            // Decode for special characters like %7B (brackets)
            const decodedCookie = decodeURIComponent(document.cookie);
            const ca = decodedCookie.split(';');
            
            for(let i = 0; i < ca.length; i++) {
                let c = ca[i].trim();
                if (c.indexOf(name) == 0) {
                    try {
                        const jsonStr = c.substring(name.length, c.length);
                        const user = JSON.parse(jsonStr);
                        // Clean username for Supabase paths
                        return user.name.toLowerCase().replace(/[^a-z0-9]/g, '');
                    } catch(e) {
                        console.error("JSON Parse failed for cookie");
                    }
                }
            }
            return "guest";
        }

        // --- 2. INITIALIZATION ---
        async function init() {
            username = fetchUserFromCookie();
            document.getElementById('display-user').innerText = `@${username}`;

            if (username === "guest") {
                alert("Login session not found. Redirecting...");
                window.location.href = "https://login.wolfvox.me";
                return;
            }

            // Init Supabase
            sb = supabase.createClient(SB_URL, SB_KEY);

            await loadRepos();
            if (activeRepo) {
                document.getElementById('path-display').innerText = `/${activeRepo}`;
                loadFiles(activeRepo);
            }
        }

        // --- 3. REPO LISTING ---
        async function loadRepos() {
            const { data, error } = await sb.storage.from('sites').list(username);
            const list = document.getElementById('repo-list');

            if (error || !data) {
                list.innerHTML = `<p class="mono" style="color:var(--danger)">Error: ${error?.message || 'Unauthorized'}</p>`;
                return;
            }

            list.innerHTML = data.map(r => `
                <a href="?repo=${r.name}" class="nav-item mono ${activeRepo === r.name ? 'active' : ''}">
                    ⬚ ${r.name}
                </a>
            `).join('');
        }

        // --- 4. FILE LISTING ---
        async function loadFiles(repo) {
            const list = document.getElementById('file-list');
            const { data, error } = await sb.storage.from('sites').list(`${username}/${repo}`);

            if (error) {
                list.innerHTML = `<p class="p-20 mono">Error fetching files.</p>`;
                return;
            }

            document.getElementById('file-count').innerText = `${data.length} items`;

            list.innerHTML = data.map(file => {
                const isFolder = !file.metadata;
                const renderLink = `${RENDER_URL}/${username}/${repo}/${file.name}`;
                
                return `
                    <div class="file-row" onclick="${isFolder ? '' : `viewCode('${repo}', '${file.name}')`}">
                        <div class="file-name mono">
                            <span class="icon" style="color:${isFolder ? 'var(--link)' : 'var(--text-muted)'}">${isFolder ? 'D' : 'F'}</span>
                            ${file.name}
                        </div>
                        <div class="flex gap-4">
                            ${isFolder ? '' : `<a href="${renderLink}" target="_blank" class="btn btn-blue" onclick="event.stopPropagation()">View Live</a>`}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // --- 5. CODE FETCHING (VIA RENDER) ---
        async function viewCode(repo, file) {
            const output = document.getElementById('code-output');
            document.getElementById('explorer-view').classList.add('hidden');
            document.getElementById('code-view').classList.remove('hidden');
            document.getElementById('current-file-name').innerText = file;
            
            output.innerText = "// Fetching content from Render...";

            try {
                // Fetch from your backend to bypass RLS and handle content-type
                const response = await fetch(`${RENDER_URL}/${repo}/${file}?user=${username}`);
                if (!response.ok) throw new Error("Failed to load file from Render service.");
                
                const text = await response.text();
                output.innerText = text;
            } catch (err) {
                output.innerText = `Error: ${err.message}`;
            }
        }

        function closeCode() {
            document.getElementById('code-view').classList.add('hidden');
            document.getElementById('explorer-view').classList.remove('hidden');
        }

        function checkCookies() {
            alert("Raw Cookies:\n" + document.cookie);
            console.log("Current Username:", username);
        }

        window.onload = init;
    </script>
</body>
</html>
