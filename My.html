<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOLFVOX | PRO REPO EXPLORER</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --surface-light: #161616;
            --border: #262626;
            --border-bright: #404040;
            --text: #ffffff;
            --text-dim: #888888;
            --accent: #CC99FF;
            --accent-dim: #7a5ba3;
            --success: #00ff88;
            --error: #ff4444;
            --warning: #ffbb00;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            height: 100vh; 
            display: flex; 
            flex-direction: column;
            overflow: hidden;
        }

        /* --- TOP NAVIGATION --- */
        nav {
            height: 60px;
            border-bottom: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            background: var(--surface);
            z-index: 10;
        }
        .brand { font-weight: 900; font-size: 22px; letter-spacing: -1px; cursor: pointer; }
        .brand span { color: var(--accent); }
        
        .session-info { display: flex; align-items: center; gap: 15px; }
        .badge { 
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            padding: 4px 10px;
            background: var(--surface-light);
            border: 1px solid var(--border-bright);
            border-radius: 4px;
            color: var(--accent);
        }

        /* --- MAIN LAYOUT --- */
        .app-body { display: flex; flex: 1; overflow: hidden; }

        /* Sidebar: Repository & File Tree */
        aside {
            width: 300px;
            border-right: 2px solid var(--border);
            background: var(--surface);
            display: flex;
            flex-direction: column;
        }
        .sidebar-section { padding: 20px; border-bottom: 1px solid var(--border); }
        .section-label { 
            font-size: 10px; 
            font-weight: 800; 
            color: var(--text-dim); 
            text-transform: uppercase; 
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: block;
        }

        .list-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
            color: var(--text-dim);
            text-decoration: none;
            margin-bottom: 2px;
        }
        .list-item:hover { background: var(--surface-light); color: var(--text); }
        .list-item.active { background: var(--accent); color: var(--bg); font-weight: 700; }
        .list-item i { width: 16px; text-align: center; font-style: normal; font-weight: bold; }

        /* Main Workspace */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            position: relative;
        }

        /* Editor Toolbar */
        .editor-header {
            height: 50px;
            background: var(--surface-light);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }
        .file-path { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--accent); }

        /* Code Display */
        .code-container {
            flex: 1;
            overflow: auto;
            background: #000;
            padding: 30px;
            position: relative;
        }
        pre { margin: 0; }
        code { 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 14px; 
            line-height: 1.6; 
            tab-size: 4;
            white-space: pre;
        }

        /* --- DIAGNOSTIC CONSOLE --- */
        #terminal {
            height: 180px;
            background: #050505;
            border-top: 2px solid var(--border);
            padding: 15px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: #ccc;
        }
        .log-entry { margin-bottom: 4px; display: flex; gap: 10px; }
        .log-ts { color: #555; }
        .log-info { color: var(--accent); }
        .log-err { color: var(--error); }
        .log-ok { color: var(--success); }

        /* Buttons */
        .btn {
            padding: 6px 14px;
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid var(--border-bright);
            background: transparent;
            color: var(--text);
            transition: 0.2s;
        }
        .btn:hover { border-color: var(--accent); color: var(--accent); }
        .btn-primary { background: var(--accent); color: var(--bg); border: none; }
        .btn-primary:hover { opacity: 0.8; color: var(--bg); }

        /* Scrollbars */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-dim);
            gap: 15px;
        }
    </style>
</head>
<body>

    <nav>
        <div class="brand" onclick="location.href='/'">WOLF<span>VOX</span></div>
        <div class="session-info">
            <span class="badge" id="user-badge">DETECTING SESSION...</span>
            <button class="btn" onclick="clearLocalCache()">PURGE CACHE</button>
        </div>
    </nav>

    <div class="app-body">
        <aside>
            <div class="sidebar-section">
                <span class="section-label">Your Repositories</span>
                <div id="repo-list-container">
                    </div>
            </div>
            <div class="sidebar-section" style="flex:1; overflow-y:auto;">
                <span class="section-label">File Explorer</span>
                <div id="file-tree-container">
                    <p style="font-size:12px; color:var(--text-dim); text-align:center;">Select a repo to explore</p>
                </div>
            </div>
        </aside>

        <main>
            <div id="editor-ui" class="hidden" style="height:100%; display:flex; flex-direction:column;">
                <div class="editor-header">
                    <div class="file-path" id="active-file-path">/root/index.html</div>
                    <div style="display:flex; gap:10px;">
                        <a id="live-preview-btn" target="_blank" class="btn btn-primary">VIEW LIVE SITE</a>
                        <button class="btn" onclick="closeEditor()">CLOSE</button>
                    </div>
                </div>
                <div class="code-container">
                    <pre><code id="code-output"></code></pre>
                </div>
            </div>

            <div id="empty-ui" class="empty-state">
                <div style="font-size: 40px;">📂</div>
                <p>No file selected for editing.</p>
                <p style="font-size: 11px;">Select a file from the sidebar to fetch from Render Service.</p>
            </div>

            <div id="terminal">
                <div class="log-entry">
                    <span class="log-ts">[SYSTEM]</span>
                    <span class="log-info">Diagnostic Console Active. Ready for Fetch.</span>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // --- 1. CONFIGURATION ---
        const SB_URL = "https://lqdrtozuoslhufhpqwae.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxxZHJ0b3p1b3NsaHVmaHBxd2FlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5ODU1MDgsImV4cCI6MjA4ODU2MTUwOH0.0WScKpedr7AB2O93bVmXXar5R8KcUPmHXyUSndIxF2o";
        const RENDER_BASE = "https://wolfcloud.onrender.com";

        let sb;
        let currentUser = "guest";
        let activeRepo = new URLSearchParams(window.location.search).get('repo');

        // --- 2. CORE SYSTEM ---

        function logger(msg, type = 'info') {
            const term = document.getElementById('terminal');
            const now = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            
            let typeClass = 'log-info';
            if(type === 'err') typeClass = 'log-err';
            if(type === 'ok') typeClass = 'log-ok';

            entry.innerHTML = `
                <span class="log-ts">[${now}]</span>
                <span class="${typeClass}">${msg}</span>
            `;
            term.appendChild(entry);
            term.scrollTop = term.scrollHeight;
        }

        async function init() {
            logger("Initializing WolfVox Explorer Kernel...");
            
            // Extract User Cookie
            const cookies = document.cookie.split('; ');
            const userCookie = cookies.find(row => row.startsWith('wv_user='));
            
            if (userCookie) {
                try {
                    const data = JSON.parse(decodeURIComponent(userCookie.split('=')[1]));
                    currentUser = data.name.toLowerCase().replace(/[^a-z0-9]/g, '');
                    logger(`User session validated: ${currentUser}`, 'ok');
                } catch(e) {
                    logger("Cookie corruption detected.", "err");
                }
            } else {
                logger("No active session. Browsing as Guest.", "warn");
            }

            document.getElementById('user-badge').innerText = `@${currentUser.toUpperCase()}`;
            
            // Connect to Supabase
            sb = supabase.createClient(SB_URL, SB_KEY);
            
            await loadRepoSidebar();
            
            if (activeRepo) {
                logger(`Active Repo detected in URL: ${activeRepo}`);
                await loadFileTree(activeRepo);
            }
        }

        // --- 3. UI LOADING ---

        async function loadRepoSidebar() {
            logger("Querying repository list...");
            const { data, error } = await sb.storage.from('sites').list(currentUser);
            
            if (error) {
                logger(`Supabase Listing Error: ${error.message}`, "err");
                return;
            }

            const container = document.getElementById('repo-list-container');
            container.innerHTML = data.map(repo => `
                <a href="?repo=${repo.name}" class="list-item ${activeRepo === repo.name ? 'active' : ''}">
                    <i>R</i> ${repo.name}
                </a>
            `).join('');
        }

        async function loadFileTree(repo) {
            logger(`Indexing files for repo: ${repo}...`);
            const container = document.getElementById('file-tree-container');
            
            const { data, error } = await sb.storage.from('sites').list(`${currentUser}/${repo}`);

            if (error || !data) {
                logger("Failed to retrieve file index.", "err");
                container.innerHTML = `<p style="padding:20px; color:var(--error); font-size:12px;">Access Denied or Empty</p>`;
                return;
            }

            container.innerHTML = data.map(file => {
                const isFolder = !file.metadata;
                return `
                    <div class="list-item" onclick="${isFolder ? '' : `fetchFileContent('${repo}', '${file.name}')`}">
                        <i style="color:${isFolder ? 'var(--accent)' : 'var(--text-dim)'}">${isFolder ? 'D' : 'F'}</i>
                        ${file.name}
                    </div>
                `;
            }).join('');
            logger(`Successfully indexed ${data.length} items.`, "ok");
        }

        // --- 4. THE FETCH KERNEL (THE BIG LOGIC) ---

        async function fetchFileContent(repo, filename) {
            const editorUI = document.getElementById('editor-ui');
            const emptyUI = document.getElementById('empty-ui');
            const output = document.getElementById('code-output');
            const pathDisplay = document.getElementById('active-file-path');
            const liveBtn = document.getElementById('live-preview-btn');

            // 1. UI Transitions
            emptyUI.classList.add('hidden');
            editorUI.classList.remove('hidden');
            pathDisplay.innerText = `/${repo}/${filename}`;
            output.innerText = "// INITIATING RENDER SERVICE HANDSHAKE...";
            
            // 2. Build Correct Render URL
            const targetUrl = `${RENDER_BASE}/${currentUser}/${repo}/${filename}`;
            liveBtn.href = targetUrl;
            
            logger(`Attempting Cross-Origin Fetch: ${targetUrl}`);

            try {
                // 3. The Fetch Attempt
                const response = await fetch(targetUrl, {
                    method: 'GET',
                    mode: 'cors', // Essential for your server settings
                    headers: { 'X-Requested-With': 'WolfVoxExplorer' }
                });

                if (!response.ok) {
                    const errDetail = `Status ${response.status}: ${response.statusText}`;
                    logger(`Render Service rejected request. ${errDetail}`, "err");
                    output.innerText = `/* ERROR IN FETCH */\n\nServer Response: ${errDetail}\n\nCheck Render Logs for User: ${currentUser}`;
                    return;
                }

                // 4. Processing Content
                const code = await response.text();
                logger(`Payload received (${code.length} bytes). Rendering code...`, "ok");
                
                // Escape HTML characters for the code viewer
                output.textContent = code;
                
            } catch (err) {
                logger(`CORS OR NETWORK FAILURE: ${err.message}`, "err");
                output.innerHTML = `
<span style="color:var(--error)">[!] CRITICAL FETCH ERROR</span>

Possible Causes:
1. CORS is not configured in your 'server.js' on Render.
2. The file '${filename}' does not exist in path '${currentUser}/${repo}/'.
3. Your Render server crashed. Check Render logs.

Debug Info: ${err.message}
                `;
            }
        }

        // --- 5. HELPERS ---

        function closeEditor() {
            document.getElementById('editor-ui').classList.add('hidden');
            document.getElementById('empty-ui').classList.remove('hidden');
        }

        function clearLocalCache() {
            localStorage.clear();
            document.cookie.split(";").forEach(function(c) { 
                document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/"); 
            });
            logger("Local data and cookies purged. Reloading...", "warn");
            setTimeout(() => location.reload(), 1000);
        }

        // Ignition
        window.onload = init;
    </script>
</body>
</html>
