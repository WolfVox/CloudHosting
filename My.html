<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WolfVox Pro | Advanced Repository Engine</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #0d1117; /* GitHub Dark Dimmed */
            --bg-side: #010409;
            --bg-hover: #161b22;
            --border: #30363d;
            --accent: #bc8cff; /* WolfVox Purple */
            --text-main: #c9d1d9;
            --text-bright: #ffffff;
            --text-muted: #8b949e;
            --syntax-bg: #000000;
            --success: #238636;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-main); 
            color: var(--text-main); 
            height: 100vh; 
            display: flex; 
            flex-direction: column;
            overflow: hidden;
        }

        /* --- TOP GLOBAL HEADER --- */
        header {
            height: 65px;
            background: var(--bg-side);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 20px;
            z-index: 100;
        }
        .logo { font-weight: 800; font-size: 22px; color: var(--text-bright); display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo i { color: var(--accent); font-size: 28px; }
        
        .search-container { flex: 1; max-width: 500px; position: relative; }
        .search-container input {
            width: 100%;
            background: var(--bg-main);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 12px 8px 35px;
            color: #fff;
            outline: none;
            font-size: 13px;
        }
        .search-container i { position: absolute; left: 12px; top: 10px; color: var(--text-muted); }

        .header-actions { display: flex; align-items: center; gap: 15px; margin-left: auto; }
        .user-pill {
            background: var(--bg-hover);
            border: 1px solid var(--border);
            padding: 5px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 600;
        }

        /* --- MAIN VIEWPORT --- */
        .viewport { display: flex; flex: 1; overflow: hidden; }

        /* --- SIDEBAR --- */
        aside {
            width: 320px;
            background: var(--bg-side);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        .sidebar-ctrl { padding: 15px; border-bottom: 1px solid var(--border); }
        .repo-select {
            width: 100%;
            background: var(--bg-hover);
            border: 1px solid var(--border);
            color: #fff;
            padding: 8px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 10px;
        }

        .tree-view { flex: 1; overflow-y: auto; padding: 10px 0; }
        .tree-item {
            padding: 6px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-main);
            transition: 0.1s;
        }
        .tree-item:hover { background: var(--bg-hover); }
        .tree-item.active { background: #1f2937; border-left: 3px solid var(--accent); color: var(--accent); }
        .tree-item i { width: 16px; text-align: center; font-size: 14px; }
        .tree-item.folder i { color: #e3b341; }
        .tree-item.file i { color: var(--text-muted); }

        /* --- CONTENT AREA --- */
        main { flex: 1; display: flex; flex-direction: column; background: var(--bg-main); overflow: hidden; }

        .breadcrumb-bar {
            padding: 12px 25px;
            background: var(--bg-main);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            font-size: 13px;
            gap: 10px;
        }
        .breadcrumb-bar a { color: #58a6ff; text-decoration: none; font-weight: 600; }
        .breadcrumb-bar span { color: var(--text-muted); }

        .editor-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        
        /* THE CODE EDITOR UI */
        .editor-header {
            height: 45px;
            background: #161b22;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
        }
        .tab {
            background: var(--bg-main);
            padding: 8px 20px;
            border: 1px solid var(--border);
            border-bottom: none;
            border-radius: 6px 6px 0 0;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
        }

        .code-view {
            flex: 1;
            background: var(--syntax-bg);
            overflow: auto;
            display: flex;
        }
        .line-numbers {
            width: 50px;
            background: #050505;
            color: #3b424d;
            text-align: right;
            padding: 20px 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            user-select: none;
            border-right: 1px solid #111;
        }
        .code-area {
            flex: 1;
            padding: 20px;
            color: #d1d5db;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre;
            outline: none;
        }

        /* --- FOOTER STATUS --- */
        footer {
            height: 30px;
            background: var(--accent);
            color: #000;
            display: flex;
            align-items: center;
            padding: 0 15px;
            font-size: 11px;
            font-weight: 700;
            justify-content: space-between;
        }

        /* BUTTONS */
        .btn {
            background: #21262d;
            border: 1px solid var(--border);
            color: #c9d1d9;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn:hover { background: #30363d; border-color: #8b949e; }
        .btn-green { background: var(--success); color: #fff; border: none; }
        .btn-green:hover { background: #2ea043; }

        .hidden { display: none !important; }
        .loading-shimmer { color: var(--accent); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

    </style>
</head>
<body>

<header>
    <div class="logo" onclick="location.href='/'">
        <i class="fa-solid fa-wolf-pack-battalion"></i>
        <span>WOLFVOX</span>
    </div>
    
    <div class="search-container">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" placeholder="Search files, commits, or repos...">
    </div>

    <div class="header-actions">
        <button class="btn" title="Create New File"><i class="fa-solid fa-plus"></i></button>
        <button class="btn"><i class="fa-solid fa-bell"></i></button>
        <div class="user-pill">
            <i class="fa-solid fa-circle-user"></i>
            <span id="user-display">guest_user</span>
        </div>
    </div>
</header>

<div class="viewport">
    <aside>
        <div class="sidebar-ctrl">
            <span style="font-size: 10px; color: var(--text-muted); font-weight: 800; display: block; margin-bottom: 8px;">ACTIVE CONTEXT</span>
            <select class="repo-select" id="repo-dropdown" onchange="switchRepo(this.value)">
                <option value="">Select Repository...</option>
            </select>
            <button class="btn" style="width: 100%; justify-content: center; background: transparent;">
                <i class="fa-solid fa-code-branch"></i> main
            </button>
        </div>

        <div class="tree-view" id="file-tree">
            <div style="padding: 40px 20px; text-align: center; color: var(--text-muted); font-size: 12px;">
                <i class="fa-solid fa-folder-tree" style="font-size: 30px; margin-bottom: 10px; display: block; opacity: 0.3;"></i>
                Choose a repository to browse the file system.
            </div>
        </div>
    </aside>

    <main>
        <div id="welcome-view" style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.5;">
            <i class="fa-solid fa-laptop-code" style="font-size: 80px; margin-bottom: 20px;"></i>
            <h2 style="font-weight: 300;">Ready to Engineer.</h2>
            <p style="font-size: 13px; margin-top: 10px;">Select a file from the tree to begin live-fetching.</p>
        </div>

        <div id="editor-view" class="hidden editor-wrapper">
            <div class="breadcrumb-bar" id="breadcrumb">
                </div>

            <div class="editor-header">
                <div class="tab">
                    <i class="fa-solid fa-file-lines" style="color: var(--accent);"></i>
                    <span id="tab-name">filename.js</span>
                </div>
                <div style="display: flex; gap: 8px;">
                    <button class="btn" onclick="copyCode()"><i class="fa-solid fa-copy"></i> Copy</button>
                    <a id="live-link" target="_blank" class="btn btn-green"><i class="fa-solid fa-rocket"></i> Go Live</a>
                </div>
            </div>

            <div class="code-view">
                <div class="line-numbers" id="line-nums">
                    </div>
                <div id="code-area" class="code-area" contenteditable="false" spellcheck="false">
                    </div>
            </div>
        </div>
    </main>
</div>

<footer>
    <div id="status-left"><i class="fa-solid fa-link"></i> RENDER_STATUS: CONNECTED</div>
    <div id="status-right">UTF-8 | LF | JavaScript</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // --- CORE CONFIGURATION ---
    const SB_URL = "https://lqdrtozuoslhufhpqwae.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxxZHJ0b3p1b3NsaHVmaHBxd2FlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5ODU1MDgsImV4cCI6MjA4ODU2MTUwOH0.0WScKpedr7AB2O93bVmXXar5R8KcUPmHXyUSndIxF2o";
    const CLOUD_URL = "https://wolfcloud.onrender.com";

    let sb;
    let username = "guest";
    let activeRepo = "";
    let currentPath = "";

    // --- INITIALIZATION ---
    async function init() {
        console.log("System: Booting Kernal 5.0...");
        
        // Authenticate User from Cookie
        const userCookie = document.cookie.split('; ').find(row => row.startsWith('wv_user='));
        if (userCookie) {
            try {
                const data = JSON.parse(decodeURIComponent(userCookie.split('=')[1]));
                username = data.name.toLowerCase().replace(/[^a-z0-9]/g, '');
            } catch(e) { console.warn("Session Corrupt"); }
        }

        document.getElementById('user-display').innerText = username;
        sb = supabase.createClient(SB_URL, SB_KEY);

        await fetchRepos();

        // Auto-load repo if in URL
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('repo')) {
            const repoFromUrl = urlParams.get('repo');
            document.getElementById('repo-dropdown').value = repoFromUrl;
            switchRepo(repoFromUrl);
        }
    }

    // --- REPOSITORY LOGIC ---
    async function fetchRepos() {
        const { data, error } = await sb.storage.from('sites').list(username);
        const dropdown = document.getElementById('repo-dropdown');

        if (error) {
            updateStatus("Supabase Auth Error", "err");
            return;
        }

        dropdown.innerHTML = '<option value="">Select Repository...</option>' + 
            data.map(r => `<option value="${r.name}">${r.name}</option>`).join('');
    }

    async function switchRepo(repoName) {
        if (!repoName) return;
        activeRepo = repoName;
        currentPath = ""; // Reset to root
        
        // Update URL without reloading
        const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?repo=' + repoName;
        window.history.pushState({path:newUrl},'',newUrl);

        await loadTree(repoName, "");
    }

    // --- RECURSIVE TREE LOGIC (GITHUB STYLE) ---
    async function loadTree(repo, path) {
        const treeElement = document.getElementById('file-tree');
        treeElement.innerHTML = `<div class="loading-shimmer" style="padding:20px; font-size:12px;">Indexing ${repo}...</div>`;
        
        const fetchPath = path ? `${username}/${repo}/${path}` : `${username}/${repo}`;
        const { data, error } = await sb.storage.from('sites').list(fetchPath);

        if (error) {
            treeElement.innerHTML = `<div style="padding:20px; color:var(--error);">Failed to fetch tree.</div>`;
            return;
        }

        let html = "";
        
        // Back Button if nested
        if (path) {
            const upPath = path.split('/').slice(0, -1).join('/');
            html += `
                <div class="tree-item folder" onclick="loadTree('${repo}', '${upPath}')">
                    <i class="fa-solid fa-turn-up"></i>
                    ..
                </div>
            `;
        }

        data.forEach(item => {
            const isFolder = !item.metadata;
            const fullItemPath = path ? `${path}/${item.name}` : item.name;
            
            if (isFolder) {
                html += `
                    <div class="tree-item folder" onclick="loadTree('${repo}', '${fullItemPath}')">
                        <i class="fa-solid fa-folder"></i>
                        ${item.name}
                    </div>
                `;
            } else {
                html += `
                    <div class="tree-item file" onclick="viewCode('${repo}', '${fullItemPath}')">
                        <i class="fa-solid fa-file-code"></i>
                        ${item.name}
                    </div>
                `;
            }
        });

        treeElement.innerHTML = html;
        updateStatus(`EXPLORING: ${repo}/${path}`, "ok");
    }

    // --- CODE ENGINE ---
    async function viewCode(repo, filePath) {
        const welcomeView = document.getElementById('welcome-view');
        const editorView = document.getElementById('editor-view');
        const codeArea = document.getElementById('code-area');
        const lineNums = document.getElementById('line-nums');
        const tabName = document.getElementById('tab-name');
        const breadcrumb = document.getElementById('breadcrumb');
        const liveLink = document.getElementById('live-link');

        welcomeView.classList.add('hidden');
        editorView.classList.remove('hidden');

        // Setup UI
        const fileName = filePath.split('/').pop();
        tabName.innerText = fileName;
        codeArea.innerText = "// CONNECTING TO RENDER CLUSTER...";
        
        // Build Breadcrumbs
        const parts = filePath.split('/');
        breadcrumb.innerHTML = `<a>${repo}</a>` + parts.map(p => `<span>/</span><a>${p}</a>`).join('');

        // The Fetch URL
        const target = `${CLOUD_URL}/${username}/${repo}/${filePath}`;
        liveLink.href = target;

        try {
            const res = await fetch(target, { mode: 'cors' });
            if (!res.ok) throw new Error("CORS_BLOCK_OR_NOT_FOUND");
            
            const rawCode = await res.text();
            
            // Render Code
            codeArea.textContent = rawCode;
            
            // Generate Line Numbers
            const lines = rawCode.split('\n').length;
            lineNums.innerHTML = Array.from({length: lines}, (_, i) => i + 1).join('<br>');
            
            updateStatus(`OPENED: ${fileName}`, "ok");
        } catch (err) {
            codeArea.innerHTML = `<span style="color:var(--error)">[SYSTEM ERROR]</span>\n\nCOULD NOT FETCH SOURCE.\n\nVerify that 'cors' middleware is active on Render server and '${filePath}' exists.`;
            lineNums.innerHTML = "!";
            updateStatus("FETCH_FAILURE", "err");
        }
    }

    // --- UTILITIES ---
    function updateStatus(msg, type) {
        const footer = document.querySelector('footer');
        const statusLeft = document.getElementById('status-left');
        
        statusLeft.innerHTML = `<i class="fa-solid fa-terminal"></i> ${msg.toUpperCase()}`;
        
        if (type === 'err') {
            footer.style.background = 'var(--error)';
            footer.style.color = '#fff';
        } else {
            footer.style.background = 'var(--accent)';
            footer.style.color = '#000';
        }
    }

    function copyCode() {
        const text = document.getElementById('code-area').innerText;
        navigator.clipboard.writeText(text);
        alert("Source Copied to Clipboard!");
    }

    window.onload = init;
</script>
</body>
</html>
