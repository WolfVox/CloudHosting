<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WolfVox | Repository Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0d1117; color: #c9d1d9; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .repo-card { border: 1px solid #30363d; background: #161b22; }
        .file-item:hover { background: #21262d; }
        .breadcrumb-item:hover { text-decoration: underline; color: #58a6ff; }
        pre { margin: 0 !important; border-radius: 0 0 8px 8px !important; }
        .sidebar { border-right: 1px solid #30363d; }
    </style>
</head>
<body class="antialiased">

    <nav class="flex items-center justify-between px-6 py-3 border-b border-[#30363d] bg-[#161b22] sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <h1 class="text-lg font-bold tracking-tighter cursor-pointer" onclick="location.href='/'">WOLF<span class="text-gray-500">VOX</span></h1>
            <div class="h-4 w-[1px] bg-gray-700"></div>
            <div id="breadcrumb" class="flex items-center gap-2 text-sm font-medium">
                <span class="text-blue-400 cursor-pointer breadcrumb-item">username</span> / 
                <span id="current-repo-name" class="text-white font-semibold">loading...</span>
            </div>
        </div>
    </nav>

    <div class="flex min-h-screen">
        <aside class="w-64 sidebar hidden md:block p-4">
            <h3 class="text-xs font-bold text-gray-500 uppercase mb-4">Repositories</h3>
            <div id="repo-list" class="space-y-1"></div>
        </aside>

        <main class="flex-1 p-6">
            <div class="max-w-5xl mx-auto">
                
                <div class="repo-card rounded-lg overflow-hidden mb-6">
                    <div class="px-4 py-3 bg-[#161b22] border-b border-[#30363d] flex justify-between items-center">
                        <div class="flex items-center gap-2">
                            <i class="fa-solid fa-code-branch text-gray-500"></i>
                            <span class="text-sm font-semibold">main</span>
                        </div>
                        <button onclick="refreshCache()" class="text-xs text-gray-400 hover:text-white transition">
                            <i class="fa-solid fa-rotate"></i> Refresh
                        </button>
                    </div>

                    <div id="file-explorer" class="divide-y divide-[#30363d]">
                        </div>
                </div>

                <div id="code-container" class="hidden repo-card rounded-lg overflow-hidden">
                    <div class="px-4 py-2 bg-[#161b22] border-b border-[#30363d] flex justify-between items-center">
                        <span id="file-name-display" class="text-xs mono">file.js</span>
                        <button onclick="closeCode()" class="text-xs text-gray-400 hover:text-red-400">Close</button>
                    </div>
                    <pre><code id="code-viewer" class="language-javascript"></code></pre>
                </div>

            </div>
        </main>
    </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>

<script>
    // --- CONFIG & AUTH ---
    const SB_URL = "https://lqdrtozuoslhufhpqwae.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxxZHJ0b3p1b3NsaHVmaHBxd2FlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5ODU1MDgsImV4cCI6MjA4ODU2MTUwOH0.0WScKpedr7AB2O93bVmXXar5R8KcUPmHXyUSndIxF2o";
    const sb = supabase.createClient(SB_URL, SB_KEY);

    let currentUser = JSON.parse(decodeURIComponent(document.cookie.split('; wv_user=')[1] || "{}"));
    let username = currentUser.name?.toLowerCase().replace(/[^a-z0-9]/g, '') || "guest";
    let activeRepo = new URLSearchParams(window.location.search).get('repo');

    // --- CACHE LOGIC ---
    function saveToCache(key, data) {
        localStorage.setItem(`wolfvox_cache_${key}`, JSON.stringify({
            timestamp: Date.now(),
            content: data
        }));
    }

    function getFromCache(key) {
        const cached = localStorage.getItem(`wolfvox_cache_${key}`);
        if (!cached) return null;
        const parsed = JSON.parse(cached);
        // Cache valid for 30 mins
        if (Date.now() - parsed.timestamp > 1800000) return null;
        return parsed.content;
    }

    // --- CORE FUNCTIONS ---
    async function init() {
        document.getElementById('current-repo-name').innerText = activeRepo || "Select Project";
        await loadRepos();
        if (activeRepo) loadFiles(activeRepo);
    }

    async function loadRepos() {
        const cachedRepos = getFromCache('repos');
        let data;
        
        if (cachedRepos) {
            data = cachedRepos;
        } else {
            const res = await sb.storage.from('sites').list(username);
            data = res.data;
            saveToCache('repos', data);
        }

        const list = document.getElementById('repo-list');
        list.innerHTML = data.map(r => `
            <a href="?repo=${r.name}" class="block px-3 py-1.5 text-sm rounded ${activeRepo === r.name ? 'bg-blue-600/20 text-blue-400' : 'text-gray-400 hover:bg-gray-800'}">
                <i class="fa-regular fa-folder mr-2"></i> ${r.name}
            </a>
        `).join('');
    }

    async function loadFiles(repo) {
        const explorer = document.getElementById('file-explorer');
        explorer.innerHTML = '<div class="p-4 text-sm text-gray-500">Loading files...</div>';

        // In Supabase Storage, recursive list is needed to mimic "folders"
        const { data, error } = await sb.storage.from('sites').list(`${username}/${repo}`, {
            limit: 100,
            offset: 0,
            sortBy: { column: 'name', order: 'asc' }
        });

        if (error) return explorer.innerHTML = "Error loading files.";

        explorer.innerHTML = data.map(file => {
            const isFolder = !file.metadata; // Simple check for folders
            return `
                <div class="file-item px-4 py-2 flex items-center justify-between cursor-pointer transition" 
                     onclick="${isFolder ? '' : `viewCode('${repo}', '${file.name}')`}">
                    <div class="flex items-center gap-3">
                        <i class="${isFolder ? 'fa-solid fa-folder text-blue-400' : 'fa-regular fa-file-code text-gray-400'}"></i>
                        <span class="text-sm">${file.name}</span>
                    </div>
                    <span class="text-xs text-gray-600">${new Date(file.created_at).toLocaleDateString()}</span>
                </div>
            `;
        }).join('');
    }

    async function viewCode(repo, fileName) {
        const path = `${username}/${repo}/${fileName}`;
        const container = document.getElementById('code-container');
        const viewer = document.getElementById('code-viewer');
        
        container.classList.remove('hidden');
        document.getElementById('file-name-display').innerText = fileName;
        viewer.innerText = "Fetching code...";

        const { data, error } = await sb.storage.from('sites').download(path);
        
        if (data) {
            const text = await data.text();
            viewer.innerText = text;
            // Set Prism language based on extension
            const ext = fileName.split('.').pop();
            viewer.className = `language-${ext === 'js' ? 'javascript' : ext}`;
            Prism.highlightElement(viewer);
        }
    }

    function closeCode() {
        document.getElementById('code-container').classList.add('hidden');
    }

    function refreshCache() {
        localStorage.clear();
        location.reload();
    }

    window.onload = init;
</script>
</body>
</html>
